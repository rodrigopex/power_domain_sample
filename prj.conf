# nothing here
CONFIG_LOG=y
CONFIG_SHELL=y

# Required by main.c (LED/button) and by the power-domain-gpio driver
# (CONFIG_POWER_DOMAIN_GPIO depends on GPIO); without it the domain devices
# reg_3v3/reg_1v8 are never defined and PM device _domains arrays fail to link.
CONFIG_GPIO=y

CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_SHELL=y
CONFIG_PM_DEVICE_RUNTIME=y
#CONFIG_PM_DEVICE_SYSTEM_MANAGED=y
CONFIG_PM_DEVICE_POWER_DOMAIN=y
CONFIG_POWER_DOMAIN=y

# Zview requirements
CONFIG_INIT_STACKS=y
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_STACK_INFO=y
# Optional Features
CONFIG_THREAD_NAME=y            # Enables thread name display
CONFIG_THREAD_RUNTIME_STATS=y   # Enables CPU usage tracking
CONFIG_SYS_HEAP_RUNTIME_STATS=y # Enables heap runtime stats and fragmentation map
